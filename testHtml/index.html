<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html, body {
    margin: 0;
    width: 64px;
    height: 64px;
    overflow: hidden;
    background: transparent;
}

#cursor {
    position: absolute;
    left: 32px;
    top: 32px;

    width: 10px;
    height: 10px;

    margin-left: -5px;
    margin-top: -5px;

    border-radius: 50%;

    background: rgba(0,170,255,0.9);
    box-shadow:
        0 0 10px rgba(0,170,255,0.8);
}


.ring {
    position:absolute;

    left:32px;
    top:32px;

    width:10px;
    height:10px;

    margin-left:-5px;
    margin-top:-5px;

    border-radius:50%;

    border:
        2px solid rgba(0,170,255,0.8);

    animation:
        expand 0.5s ease-out forwards;
}


@keyframes expand {

    from {
        transform:scale(1);
        opacity:1;
    }

    to {
        transform:scale(6);
        opacity:0;
    }

}



.particle {

    position:absolute;

    width:4px;
    height:4px;

    margin-left:-2px;
    margin-top:-2px;

    border-radius:50%;

    background:
        rgba(0,180,255,0.8);

    pointer-events:none;

    animation:
        particleMove
        0.5s
        linear
        forwards;
}



@keyframes particleMove {

    from {

        transform:
            translate(0,0)
            scale(1);

        opacity:1;
    }


    to {

        transform:
            translate(var(--x),var(--y))
            scale(0);

        opacity:0;
    }

}

</style>

</head>


<body>


<div id="cursor"></div>


<script>

const cursor =
    document.getElementById("cursor");


let mouseDown = false;


function clickEffect()
{
    const ring =
        document.createElement("div");

    ring.className="ring";

    document.body.appendChild(ring);


    setTimeout(
        ()=>ring.remove(),
        500
    );
}



function particle()
{

    const p =
        document.createElement("div");


    p.className="particle";


    let x =
        (Math.random()-0.5)*40;

    let y =
        (Math.random()-0.5)*40;


    p.style.left="32px";
    p.style.top="32px";


    p.style.setProperty(
        "--x",
        x+"px"
    );


    p.style.setProperty(
        "--y",
        y+"px"
    );


    document.body.appendChild(p);


    setTimeout(
        ()=>p.remove(),
        500
    );
}



window.moveCursor =
function(x,y,pressed)
{

    if(pressed && !mouseDown)
    {
        clickEffect();
    }


    mouseDown = pressed;


    if(pressed)
    {
        particle();
    }

}


</script>

</body>
</html>
